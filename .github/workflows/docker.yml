name: Build and Test Docker Image

on:
  push:
    branches: [ "main", "docker" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # 1. Етап збірки та публікації (Build and Push)
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: ghcr.io/arturich666/fucking-practice-docker:latest/${{ github.event.repository.name }}:latest

  # 2. Етап тестування (Test)
  test:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        run: docker pull ghcr.io/arturich666/fucking-practice-docker:latest

      - name: Run tests inside container
        # Якщо у вас є файл тестів, наприклад, pytest
        run: docker run ghcr.io/arturich666/fucking-practice-docker:latest python -m pytest