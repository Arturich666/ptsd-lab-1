name: Build and push Docker image

on:
  push:
    branches:
      - main
      - docker

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Build and push the image
        run: |
          docker login --username Arturich666 --password ${{ secrets.GH_PAT}} ghcr.io
          docker build . --tag ghcr.io/arturich666/my-app:latest
          docker push ghcr.io/arturich666/my-app:latest

  test:
    runs-on: ubuntu-latest
    needs: build_and_push
    steps: 
      - name: Pull and run tests
        run: |
          docker login --username Arturich666 --password ${{ secrets.GH_PAT}} ghcr.io
          docker pull ghcr.io/arturich666/my-app:latest
          docker run --rm ghcr.io/arturich666/my-app:latest pytest